# Closed-list taxonomy. Every entity's tag fields must resolve here.
# See future-plans/04-taxonomy.md for the governance rules.

# Component patterns — cross-system primitives. Adding one requires >=2 instances.
componentPatterns:
  - slug: button
    name: Button
    description: Primary action control; clickable element that triggers an action.

  - slug: icon-button
    name: Icon Button
    description: Compact button whose label is an icon, used when space is tight.

  - slug: input-text
    name: Text Input
    description: Single-line editable text field.

  - slug: input-textarea
    name: Textarea
    description: Multi-line editable text field.

  - slug: dialog
    name: Dialog
    description: Modal overlay for focused tasks requiring user attention.

  - slug: tooltip
    name: Tooltip
    description: Transient label that appears on hover or focus.

  - slug: badge
    name: Badge
    description: Small status or label indicator.

  - slug: tabs
    name: Tabs
    description: Toggles between related panels of content.

  - slug: tooltip-trigger
    name: Tooltip Trigger
    description: Element that activates a tooltip on hover or focus.

  - slug: callout
    name: Callout
    description: Inline notice or annotation that draws attention without blocking flow.

  - slug: spinner
    name: Spinner
    description: Indeterminate loading indicator.

  - slug: skeleton
    name: Skeleton
    description: Placeholder shape shown while content loads, to preserve layout.

# Section patterns — cross-system compositions. Same >=2 rule.
sectionPatterns: []

